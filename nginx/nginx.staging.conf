server_tokens off;

# Staging ingress: clients hit this nginx directly over plain HTTP (no
# CloudFront/TLS in front — see tofu/staging-app, enable_direct_http=true), so
# unlike nginx.conf there is no upstream proxy to trust X-Forwarded-For from.
# remote_addr is the real client; nginx sets XFF itself when proxying to the API.

server {
    listen 80 default_server;
    server_name _;

    # Docker's embedded DNS resolver — re-resolves api:8000 after container restarts
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $api_host api:8000;

    # SPA bundle (mounted from ./dist by docker-compose.staging.yml). Unlike
    # production — where CloudFront + S3 serve the frontend — staging serves it
    # straight off this box so the whole app is reachable at http://<eip>/.
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    location /api/ {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /auth/ {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass         http://$api_host$uri$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
