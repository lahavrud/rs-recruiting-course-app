# Staging deployment compose — ephemeral EC2 + RDS, no CloudFront, no Grafana.
#
# Differs from docker-compose.deploy.yml (production):
#   - nginx serves the frontend bundle (./dist) AND reverse-proxies the API,
#     because there's no CloudFront/S3 in front (see tofu/staging-app).
#   - no grafana-alloy sidecar and no OTLP/awslogs — staging has no
#     observability module; logs stay on the box via the json-file driver.
#   - app reads config from /rs-recruiting/staging/* in SSM (ENVIRONMENT=staging);
#     FRONTEND_BASE_URL / ALLOWED_ORIGINS are injected per-cycle from the box's
#     Elastic IP by scripts/deploy_ec2_staging.sh (the IP changes each cycle, so
#     they can't be static SSM params).
#
# Required env at compose-time (exported by scripts/deploy_ec2_staging.sh):
#   ECR_REGISTRY       — <staging-account>.dkr.ecr.us-east-1.amazonaws.com
#   IMAGE_TAG          — the RC tag being staged (vX.Y.Z-rc.N)
#   FRONTEND_BASE_URL  — http://<eip>/
#   ALLOWED_ORIGINS    — http://<eip>

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.staging.conf:/etc/nginx/conf.d/default.conf:ro
      - ./dist:/usr/share/nginx/html:ro
    networks:
      # Pinned IP so the api container can trust it as its sole XFF proxy — see
      # the matching note in docker-compose.deploy.yml.
      default:
        ipv4_address: 172.28.0.2
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  api:
    image: ${ECR_REGISTRY}/rs-recruiting/api:${IMAGE_TAG}
    environment:
      - ENVIRONMENT=staging
      - SENTRY_RELEASE=${IMAGE_TAG}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      # nginx's pinned IP is the only trusted X-Forwarded-For source.
      - FORWARDED_ALLOW_IPS=172.28.0.2
    networks:
      default:
        ipv4_address: 172.28.0.3
    volumes:
      - app-data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  worker:
    image: ${ECR_REGISTRY}/rs-recruiting/api:${IMAGE_TAG}
    command: ["python", "-m", "src.worker"]
    environment:
      - ENVIRONMENT=staging
      - SENTRY_RELEASE=${IMAGE_TAG}
    networks:
      default:
        ipv4_address: 172.28.0.5
    restart: unless-stopped

volumes:
  app-data:

networks:
  default:
    ipam:
      config:
        - subnet: 172.28.0.0/24
