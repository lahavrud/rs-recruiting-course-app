name: Build & push images
description: >-
  Build the shared base image then the api + worker images, plus the Alloy
  sidecar image, and push them all to ECR. The base is pushed first so the
  per-service buildx builds resolve it as their FROM from the registry (sharing a
  locally-built base across separate buildx invocations is unreliable). Alloy is
  independent (FROM grafana/alloy). Assumes the caller has already logged in to
  the target registry (aws-actions/amazon-ecr-login).

inputs:
  registry:
    description: "ECR registry host, e.g. <ops-account>.dkr.ecr.us-east-1.amazonaws.com"
    required: true
  image-tag:
    description: "Primary image tag — the git ref name (rc tag or final version)"
    required: true
  sha:
    description: "Commit SHA, applied as an additional immutable tag (and the base tag)"
    required: true

runs:
  using: composite
  steps:
    - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

    - name: Build & push shared base
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: docker/base.Dockerfile
        push: true
        provenance: false
        sbom: false
        tags: ${{ inputs.registry }}/rs-recruiting/base:${{ inputs.sha }}
        cache-from: type=gha,scope=base
        cache-to: type=gha,mode=max,scope=base

    - name: Build & push api
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: services/api/Dockerfile
        build-args: |
          BASE_IMAGE=${{ inputs.registry }}/rs-recruiting/base:${{ inputs.sha }}
        push: true
        provenance: false
        sbom: false
        tags: |
          ${{ inputs.registry }}/rs-recruiting/api:${{ inputs.image-tag }}
          ${{ inputs.registry }}/rs-recruiting/api:${{ inputs.sha }}
        cache-from: type=gha,scope=api
        cache-to: type=gha,mode=max,scope=api

    - name: Build & push worker
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: services/worker/Dockerfile
        build-args: |
          BASE_IMAGE=${{ inputs.registry }}/rs-recruiting/base:${{ inputs.sha }}
        push: true
        provenance: false
        sbom: false
        tags: |
          ${{ inputs.registry }}/rs-recruiting/worker:${{ inputs.image-tag }}
          ${{ inputs.registry }}/rs-recruiting/worker:${{ inputs.sha }}
        cache-from: type=gha,scope=worker
        cache-to: type=gha,mode=max,scope=worker

    - name: Build & push alloy sidecar
      uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
      with:
        context: .
        file: docker/alloy.Dockerfile
        push: true
        provenance: false
        sbom: false
        tags: |
          ${{ inputs.registry }}/rs-recruiting/alloy:${{ inputs.image-tag }}
          ${{ inputs.registry }}/rs-recruiting/alloy:${{ inputs.sha }}
        cache-from: type=gha,scope=alloy
        cache-to: type=gha,mode=max,scope=alloy
