name: SSM deploy
description: Trigger an EC2 deploy via SSM Run Command and poll until it completes.

inputs:
  ref:
    description: "Tag or SHA to deploy — used as both the S3 key prefix and IMAGE_TAG"
    required: true
  instance-id:
    description: "EC2 instance ID to run the deploy command on"
    required: true
  environment:
    description: "Deploy environment — selects the deploy S3 bucket (rs-recruiting-deploy-<env>-<account>)"
    required: false
    default: prod
  script-name:
    description: "Deploy script to fetch from the bucket and run on the box"
    required: false
    default: deploy_ec2.sh
  ecr-registry:
    description: "ECR registry to pull images from (ops account). Passed through to the deploy script; if empty it falls back to the instance's own account."
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Trigger deploy via SSM Run Command
      id: ssm
      shell: bash
      run: |
        REF="${{ inputs.ref }}"
        ENV="${{ inputs.environment }}"
        SCRIPT="${{ inputs.script-name }}"
        ECR_REGISTRY="${{ inputs.ecr-registry }}"
        ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
        S3_BUCKET="rs-recruiting-deploy-${ENV}-${ACCOUNT_ID}"
        DEPLOY_CMD="aws s3 cp s3://${S3_BUCKET}/deploy/${REF}/${SCRIPT} /tmp/deploy_${REF}.sh && ENVIRONMENT=${ENV} IMAGE_TAG=${REF} ECR_REGISTRY=${ECR_REGISTRY} bash /tmp/deploy_${REF}.sh"
        PARAMS=$(jq -n --arg cmd "$DEPLOY_CMD" '{commands: [$cmd]}')
        COMMAND_ID=$(aws ssm send-command \
          --instance-ids "${{ inputs.instance-id }}" \
          --document-name "AWS-RunShellScript" \
          --timeout-seconds 300 \
          --parameters "$PARAMS" \
          --query "Command.CommandId" \
          --output text)
        echo "==> SSM command ID: ${COMMAND_ID}"
        echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

    # 54 * 10s = 9 min ceiling
    - name: Wait for deploy to complete
      shell: bash
      run: |
        COMMAND_ID="${{ steps.ssm.outputs.command_id }}"
        for i in $(seq 1 54); do
          STATUS=$(aws ssm get-command-invocation \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ inputs.instance-id }}" \
            --query "Status" --output text 2>/dev/null || echo "Pending")
          echo "[${i}/54] ${STATUS}"
          case "${STATUS}" in
            Success)
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ inputs.instance-id }}" \
                --query "StandardOutputContent" --output text
              exit 0
              ;;
            Failed|TimedOut|Cancelled|Cancelling)
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ inputs.instance-id }}" \
                --query "StandardOutputContent" --output text
              aws ssm get-command-invocation \
                --command-id "${COMMAND_ID}" \
                --instance-id "${{ inputs.instance-id }}" \
                --query "StandardErrorContent" --output text
              exit 1
              ;;
          esac
          sleep 10
        done
        echo "==> Timed out waiting for deploy (9 min)"
        exit 1
