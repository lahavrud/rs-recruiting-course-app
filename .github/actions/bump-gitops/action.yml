name: Bump gitops image tags
description: >-
  Point one environment at a new image tag by committing to the gitops repo —
  the ONLY way anything reaches a cluster (strict GitOps: CI has no cluster
  credentials; ArgoCD pulls the change). Auth is a short-lived GitHub App
  installation token (app rs-course-ci-bot, Contents R/W on the gitops repo
  only), not a PAT.

inputs:
  environment:
    description: "Target env directory under environments/ (dev | stage | prod)"
    required: true
  api-tag:
    description: "New tag for the api image (omit to leave api unchanged)"
    required: false
    default: ""
  worker-tag:
    description: "New tag for the worker image (omit to leave worker unchanged)"
    required: false
    default: ""
  app-id:
    description: "GitHub App id (CI_BOT_APP_ID secret)"
    required: true
  private-key:
    description: "GitHub App private key (CI_BOT_PRIVATE_KEY secret)"
    required: true

runs:
  using: composite
  steps:
    - name: Mint installation token
      id: app-token
      uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
      with:
        app-id: ${{ inputs.app-id }}
        private-key: ${{ inputs.private-key }}
        owner: lahavrud
        repositories: rs-recruiting-course-gitops

    - name: Commit tag bump
      shell: bash
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
        ENV_NAME: ${{ inputs.environment }}
        API_TAG: ${{ inputs.api-tag }}
        WORKER_TAG: ${{ inputs.worker-tag }}
      run: |
        set -euo pipefail
        git clone --depth 1 \
          "https://x-access-token:${GH_TOKEN}@github.com/lahavrud/rs-recruiting-course-gitops.git" gitops
        cd gitops
        git config user.name "rs-course-ci-bot[bot]"
        git config user.email "rs-course-ci-bot[bot]@users.noreply.github.com"

        if [ -z "$API_TAG" ] && [ -z "$WORKER_TAG" ]; then
          echo "neither api-tag nor worker-tag given — nothing to bump" >&2
          exit 1
        fi

        # Retry the push: concurrent pipeline runs may race on the same branch.
        # Only the services whose tag was passed are written (a per-service prod
        # release bumps one; stage/dev pass both). An unchanged service is
        # written back to its existing value, leaving git diff empty for it, so
        # ArgoCD rolls only the chart(s) that actually changed.
        for attempt in 1 2 3; do
          msg_parts=()
          if [ -n "$API_TAG" ]; then
            yq -i '.image.tag = strenv(API_TAG)' "environments/${ENV_NAME}/api.yaml"
            msg_parts+=("api -> ${API_TAG}")
          fi
          if [ -n "$WORKER_TAG" ]; then
            yq -i '.image.tag = strenv(WORKER_TAG)' "environments/${ENV_NAME}/worker.yaml"
            msg_parts+=("worker -> ${WORKER_TAG}")
          fi
          summary=$(IFS=', '; echo "${msg_parts[*]}")
          if git diff --quiet; then
            echo "environments/${ENV_NAME} already at ${summary} — nothing to do"
            exit 0
          fi
          git add "environments/${ENV_NAME}"
          git commit -m "deploy(${ENV_NAME}): ${summary}"
          if git push origin main; then
            exit 0
          fi
          echo "push raced (attempt ${attempt}), rebasing"
          git fetch origin main
          git reset --hard origin/main
        done
        echo "failed to push after 3 attempts" >&2
        exit 1
