name: Deploy frontend
description: Build the frontend bundle and deploy it to S3 + CloudFront.

inputs:
  ref:
    description: "Git ref to check out"
    required: true
  release-version:
    description: "Value for VITE_RELEASE (Sentry release correlation)"
    required: true
  sentry-dsn:
    required: true
  aws-role-arn:
    required: true
  s3-bucket:
    required: true
  cloudfront-distribution-id:
    required: true

runs:
  using: composite
  steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      with:
        ref: ${{ inputs.ref }}
        fetch-depth: 1

    - uses: actions/setup-node@v6
      with:
        node-version: 20
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      shell: bash
      run: cd frontend && npm ci

    - name: Build
      shell: bash
      run: cd frontend && npm run build
      env:
        VITE_SENTRY_DSN: ${{ inputs.sentry-dsn }}
        VITE_RELEASE: ${{ inputs.release-version }}
        VITE_GTM_ID: GTM-PRRX7D6L

    - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: us-east-1

    - name: Sync to S3
      shell: bash
      run: |
        # All other assets first (additive, immutable) — lifecycle rule expires stale bundles after 3 days
        aws s3 sync frontend/dist/ \
          s3://${{ inputs.s3-bucket }}/ \
          --exclude "index.html" \
          --cache-control "public, max-age=31536000, immutable"
        # index.html last — no-cache so browsers always fetch the latest bundle references,
        # and by now every chunk it points to already exists in S3
        aws s3 cp frontend/dist/index.html \
          s3://${{ inputs.s3-bucket }}/index.html \
          --cache-control "no-cache, no-store, must-revalidate"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id ${{ inputs.cloudfront-distribution-id }} \
          --paths "/index.html"
