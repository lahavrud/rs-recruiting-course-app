name: Deploy frontend
description: >-
  Build the Vite bundle and sync it to the env's S3 bucket + invalidate
  CloudFront. Deploy targets (bucket, distribution id, domain) are read at
  runtime from the SSM parameter the frontend Terragrunt unit publishes —
  the distribution id changes whenever the env is destroyed and recreated,
  so nothing here may be hardcoded.

inputs:
  env:
    description: "Logical env owning the frontend (stage | prod)"
    required: true
  aws-role-arn:
    description: "The env's ci-frontend-deploy role (OIDC trust is ref-locked per env)"
    required: true

outputs:
  domain:
    description: "The env's CloudFront domain (for smoke checks)"
    value: ${{ steps.targets.outputs.domain }}

runs:
  using: composite
  steps:
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: 22
        cache: npm
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      shell: bash
      run: cd frontend && npm ci

    - name: Build
      shell: bash
      run: cd frontend && npm run build

    - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
      with:
        role-to-assume: ${{ inputs.aws-role-arn }}
        aws-region: eu-central-1

    - name: Resolve deploy targets
      id: targets
      shell: bash
      run: |
        set -euo pipefail
        config=$(aws ssm get-parameter \
          --name "/rs-course/${{ inputs.env }}/frontend/deploy" \
          --query Parameter.Value --output text)
        {
          echo "bucket=$(jq -r .bucket <<<"$config")"
          echo "distribution_id=$(jq -r .distribution_id <<<"$config")"
          echo "domain=$(jq -r .domain <<<"$config")"
        } >> "$GITHUB_OUTPUT"

    - name: Sync to S3
      shell: bash
      run: |
        # Hashed assets first (additive, immutable); index.html last with
        # no-cache so browsers always fetch the latest bundle references —
        # by then every chunk it points to already exists in S3.
        aws s3 sync frontend/dist/ \
          "s3://${{ steps.targets.outputs.bucket }}/" \
          --exclude "index.html" \
          --cache-control "public, max-age=31536000, immutable"
        aws s3 cp frontend/dist/index.html \
          "s3://${{ steps.targets.outputs.bucket }}/index.html" \
          --cache-control "no-cache, no-store, must-revalidate"

    - name: Invalidate CloudFront cache
      shell: bash
      run: |
        aws cloudfront create-invalidation \
          --distribution-id "${{ steps.targets.outputs.distribution_id }}" \
          --paths "/index.html"
