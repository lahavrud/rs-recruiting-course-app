name: CI Pipeline

# Cancel superseded PR runs; never cancel main — a green main run triggers
# cd.yml, so killing it would silently skip the deploy.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  merge_group:
    branches: ["main"]

permissions:
  contents: read

jobs:
  # Flags which areas changed so unchanged ones skip their job (each skipped job
  # saves a full billed minute). Non-PR events flag everything and run the lot.
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.diff.outputs.backend }}
      frontend: ${{ steps.diff.outputs.frontend }}
      docker: ${{ steps.diff.outputs.docker }}
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0
      - id: diff
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: bash scripts/ci/detect-changes.sh >> "$GITHUB_OUTPUT"

  # Lint + validators + tests in one job (pay the 1-min billing floor once).
  # The job-level `if` gates every step, so no per-step guards are needed.
  backend-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16 # migrations CREATE EXTENSION vector
        env:
          POSTGRES_DB: rs_recruitment_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test # pragma: allowlist secret
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: "postgresql+asyncpg://test:test@localhost:5432/rs_recruitment_test" # pragma: allowlist secret
      JWT_SECRET_KEY: "test_secret_key_for_ci_only_min_32_chars_long" # pragma: allowlist secret
      JWT_ALGORITHM: "HS256"
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      PYTHONPATH: "."
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --group dev --group test

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Static validators
        run: make validators

      - name: Run Tests
        # -n auto: one xdist worker per CPU, each with its own DB (conftest.py),
        # so the autouse table cleanup can't race.
        run: uv run pytest -n auto --cov=rs_shared --cov=rs_api --cov=rs_worker --cov-report=xml --cov-report=term

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  frontend-checks:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - name: TypeScript type check
        run: npx tsc -b --noEmit
      - name: ESLint
        run: npm run lint
      - name: Tests
        run: npm test

  # Smoke-test the real compose stack (`make up`'s). `--wait` blocks on each
  # service's healthcheck — the api's curls /health — so no retry loops here.
  docker-build:
    needs: [detect-changes, backend-checks]
    if: github.event_name == 'pull_request' && github.event.pull_request.draft == false && needs.detect-changes.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Build images (base → api → worker)
        run: make images

      - name: Start stack and wait for health
        run: docker compose --profile app up -d --wait

      - name: Dump logs on failure
        if: failure()
        run: docker compose --profile app logs

      - name: Cleanup
        if: always()
        run: docker compose --profile app down -v

  # The single required check (branch ruleset: ["CI Gate"]). A skipped need
  # isn't a failure, so docs-only PRs — where every real job skips — still pass.
  ci-gate:
    name: CI Gate
    if: always()
    needs: [backend-checks, frontend-checks, docker-build]
    runs-on: ubuntu-latest
    steps:
      - if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  # Ping Slack only on a broken main (it blocks delivery); a broken PR is
  # already visible on the PR itself.
  notify-failure:
    needs: [detect-changes, backend-checks, frontend-checks, docker-build, ci-gate]
    if: failure() && github.event_name == 'push'
    uses: ./.github/workflows/_notify-failure.yml
    secrets:
      webhook-url: ${{ secrets.SLACK_WEBHOOK_NONPROD }}
