name: Deploy to Production

# Manual redeploy of an already-built/already-promoted tag (or raw SHA) —
# rollback escape hatch and ad-hoc redeploy. Normal releases go through
# release.yml, triggered by cut-release.yml. See docs/release-process.md.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag or SHA to deploy — leave blank to redeploy CURRENT_SHA"
        required: false

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Build & deploy frontend to S3 + CloudFront ────────────────────────────

  deploy-frontend:
    name: Build & deploy frontend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/deploy-frontend
        with:
          ref: ${{ github.event.inputs.tag }}
          release-version: ${{ github.event.inputs.tag }}
          sentry-dsn: ${{ secrets.VITE_SENTRY_DSN }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          s3-bucket: ${{ secrets.S3_FRONTEND_BUCKET }}
          cloudfront-distribution-id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ── Deploy backend to EC2 ─────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deploy-frontend]
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve tag to deploy
        id: tag
        run: |
          INPUT_TAG="${{ github.event.inputs.tag }}"
          if [ -n "${INPUT_TAG}" ]; then
            echo "tag=${INPUT_TAG}" >> "$GITHUB_OUTPUT"
          else
            CURRENT=$(aws ssm get-parameter \
              --name /rs-recruiting/infra/CURRENT_SHA \
              --query 'Parameter.Value' --output text)
            echo "tag=${CURRENT}" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/ssm-deploy
        with:
          ref: ${{ steps.tag.outputs.tag }}
          instance-id: ${{ secrets.EC2_INSTANCE_ID }}

  # ── Failure notification ──────────────────────────────────────────────────

  notify-failure:
    name: Notify deploy failure
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - name: Resolve display tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag }}"
          [ -z "${TAG}" ] && TAG="CURRENT_SHA"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - uses: ./.github/actions/notify-failure
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Deploy failed: ${{ steps.tag.outputs.tag }}"
          body: |
            **Deploy failed** for `${{ steps.tag.outputs.tag }}`.

            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for current production state and logs.

            To redeploy a previous version: [run the rollback workflow](https://github.com/${{ github.repository }}/actions/workflows/rollback.yml).
