# Cut a prod release for ONE service. A human runs this (the deliberate prod
# gate); the machine computes the next semver from conventional commits since
# that service's last tag and pushes `<service>-vX.Y.Z`. Devs never calculate a
# version. The tag push is what triggers deploy-prod.yml — so this workflow
# touches no cloud and holds no deploy credentials.
#
# The tag MUST be pushed with the CI-bot App token, not the default
# GITHUB_TOKEN: tags pushed by GITHUB_TOKEN do not trigger other workflows, so
# deploy-prod.yml would never fire. (Requires the rs-course-ci-bot App to have
# Contents:write on THIS repo — see .claude/rules/infra.md.)

name: Cut release

on:
  workflow_dispatch:
    inputs:
      service:
        description: "Service to release"
        type: choice
        options: [api, worker, frontend]
        required: true

# One release per service at a time; releases are cheap but never race the tag.
concurrency:
  group: cut-release-${{ inputs.service }}
  cancel-in-progress: false

permissions:
  contents: read # the tag is pushed via the App token, not GITHUB_TOKEN

jobs:
  cut:
    runs-on: ubuntu-latest
    steps:
      - name: Mint App token (push tag to this repo)
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          owner: lahavrud
          repositories: rs-recruiting-course-app

      - uses: actions/checkout@v7.0.1
        with:
          fetch-depth: 0 # full history + all tags for next-version.sh
          token: ${{ steps.app-token.outputs.token }} # so the tag push triggers deploy-prod.yml

      - name: Compute version, tag & push
        run: bash scripts/ci/cut-release.sh "${{ inputs.service }}"

  notify-failure:
    needs: [cut]
    if: failure()
    uses: ./.github/workflows/_notify-failure.yml
    secrets:
      webhook-url: ${{ secrets.SLACK_WEBHOOK_PROD }}
