name: Release

# Triggered by deploy-staging.yml (`-rc.N` tags) or cut-release.yml (final
# `vX.Y.Z` tags) explicitly dispatching this workflow against the tag they
# just pushed — a GITHUB_TOKEN-authored push doesn't fire push-based workflow
# runs on its own, so the push trigger below only catches a tag pushed with
# a human's own git credentials. RC tags only build & push an image — no
# deploy target until #890 adds ephemeral staging. Final tags promote the
# already-built RC image (no rebuild) and run the full production deploy.
# See docs/release-process.md for the full release ritual.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── RC: build & push image only ─────────────────────────────────────────

  build-rc:
    name: Build & push RC image
    if: contains(github.ref_name, '-rc.')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Check if RC image already in ECR
        id: rc_exists
        run: |
          if aws ecr describe-images \
            --repository-name rs-recruiting/api \
            --image-ids imageTag=${{ github.ref_name }} \
            --region us-east-1 > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "==> Image already exists — skipping build"
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: steps.rc_exists.outputs.exists != 'true'

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        if: steps.rc_exists.outputs.exists != 'true'
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/rs-recruiting/api:${{ github.ref_name }}
            ${{ secrets.ECR_REGISTRY }}/rs-recruiting/api:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ── Final: promote RC image (no rebuild) ────────────────────────────────

  promote-prod:
    name: Promote to production
    if: ${{ !contains(github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Promote existing RC image, or build fresh
        id: promote
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          TAG="${{ github.ref_name }}"
          if aws ecr describe-images \
            --repository-name rs-recruiting/api \
            --image-ids imageTag="${SHA}" \
            --region us-east-1 > /dev/null 2>&1; then
            echo "==> Found image for ${SHA} — re-tagging ${TAG} (no rebuild)"
            IMAGE_MANIFEST=$(aws ecr batch-get-image \
              --repository-name rs-recruiting/api \
              --image-ids imageTag="${SHA}" \
              --region us-east-1 \
              --query 'images[0].imageManifest' --output text)
            aws ecr put-image \
              --repository-name rs-recruiting/api \
              --image-tag "${TAG}" \
              --image-manifest "${IMAGE_MANIFEST}" \
              --region us-east-1 > /dev/null
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
          else
            echo "==> No image found for ${SHA} — building fresh (no preceding RC; safety net)"
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
        if: steps.promote.outputs.rebuild == 'true'

      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7
        if: steps.promote.outputs.rebuild == 'true'
        with:
          context: .
          push: true
          provenance: false
          sbom: false
          tags: |
            ${{ secrets.ECR_REGISTRY }}/rs-recruiting/api:${{ github.ref_name }}
            ${{ secrets.ECR_REGISTRY }}/rs-recruiting/api:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Upload version-pinned artifacts to S3
        run: |
          TAG="${{ github.ref_name }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruiting-deploy-prod-${ACCOUNT_ID}"
          aws s3 cp docker-compose.deploy.yml "s3://${S3_BUCKET}/deploy/${TAG}/docker-compose.deploy.yml"
          aws s3 cp scripts/deploy_ec2.sh     "s3://${S3_BUCKET}/deploy/${TAG}/deploy_ec2.sh"
          aws s3 cp nginx/nginx.conf          "s3://${S3_BUCKET}/deploy/${TAG}/nginx.conf"
          aws s3 cp alloy/config.alloy        "s3://${S3_BUCKET}/deploy/${TAG}/alloy/config.alloy"

  # ── Build & deploy frontend to S3 + CloudFront ────────────────────────────

  deploy-frontend:
    name: Build & deploy frontend
    if: ${{ !contains(github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/deploy-frontend
        with:
          ref: ${{ github.ref_name }}
          release-version: ${{ github.ref_name }}
          sentry-dsn: ${{ secrets.VITE_SENTRY_DSN }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          s3-bucket: ${{ secrets.S3_FRONTEND_BUCKET }}
          cloudfront-distribution-id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ── Deploy backend to EC2 ─────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [promote-prod, deploy-frontend]
    if: |
      always() && !contains(github.ref_name, '-rc.') &&
      needs.promote-prod.result == 'success' &&
      needs.deploy-frontend.result == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: ./.github/actions/ssm-deploy
        with:
          ref: ${{ github.ref_name }}
          instance-id: ${{ secrets.EC2_INSTANCE_ID }}

  # ── GitHub Release ──────────────────────────────────────────────────────

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ !contains(github.ref_name, '-rc.') && needs.deploy.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}"

  # ── Failure notification ──────────────────────────────────────────────────

  notify-failure:
    name: Notify release failure
    runs-on: ubuntu-latest
    needs: [build-rc, promote-prod, deploy-frontend, deploy, github-release]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/notify-failure
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Release failed: ${{ github.ref_name }}"
          body: |
            **Release failed** for tag [`${{ github.ref_name }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for current production state and logs.

            To redeploy a previous version: [run the rollback workflow](https://github.com/${{ github.repository }}/actions/workflows/rollback.yml).
