name: Release

# Triggered by deploy-staging.yml (`-rc.N` tags) or cut-release.yml (final
# `vX.Y.Z` tags) explicitly dispatching this workflow against the tag they
# just pushed — a GITHUB_TOKEN-authored push doesn't fire push-based workflow
# runs on its own, so the push trigger below only catches a tag pushed with
# a human's own git credentials. RC tags build & push the image (to prod ECR
# for later promotion, and mirrored to the staging-account ECR), then trigger
# the infra repo's staging-apply.yml to spin up ephemeral staging; staging-
# deploy.yml ships the RC there via the provisioning callback. Final tags
# promote the already-built RC image (no rebuild), run the full production
# deploy, then tear staging down.
# See docs/release-process.md for the full release ritual.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── RC: build & push image only ─────────────────────────────────────────

  build-rc:
    name: Build & push RC images
    if: contains(github.ref_name, '-rc.')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      # Build once into the ops/shared-services account. prod + staging pull the
      # same images cross-account (the ecr units grant their account roots pull),
      # so there's no longer a per-account mirror step.
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_OPS_ECR_PUSH_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Check if RC images already in ECR
        id: rc_exists
        run: |
          if aws ecr describe-images \
            --repository-name rs-recruiting/api \
            --image-ids imageTag=${{ github.ref_name }} \
            --region us-east-1 > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "==> RC images already exist — skipping build"
          fi

      - name: Build & push RC images (base + api + worker)
        if: steps.rc_exists.outputs.exists != 'true'
        uses: ./.github/actions/build-images
        with:
          registry: ${{ secrets.OPS_ECR_REGISTRY }}
          image-tag: ${{ github.ref_name }}
          sha: ${{ github.sha }}

      - name: Mint GitHub App token (infra repo)
        id: app-token
        # TODO: pin to a commit SHA to match the repo's action-pinning convention.
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lahavrud
          repositories: rs-recruiting-infra

      - name: Provision ephemeral staging
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run staging-apply.yml \
            -R lahavrud/rs-recruiting-infra \
            -f rc_tag=${{ github.ref_name }}

  # ── Final: promote RC image (no rebuild) ────────────────────────────────

  promote-prod:
    name: Promote to production
    if: ${{ !contains(github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      # Image promotion happens in the ops account (the build-once registry).
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_OPS_ECR_PUSH_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Re-tag RC images to the final tag, or flag a rebuild
        id: promote
        run: |
          set -euo pipefail
          SHA="${{ github.sha }}"
          TAG="${{ github.ref_name }}"
          rebuild=false
          for repo in rs-recruiting/api rs-recruiting/worker rs-recruiting/alloy; do
            if aws ecr describe-images \
              --repository-name "${repo}" \
              --image-ids imageTag="${SHA}" \
              --region us-east-1 > /dev/null 2>&1; then
              echo "==> ${repo}: found ${SHA} — re-tagging ${TAG} (no rebuild)"
              MANIFEST=$(aws ecr batch-get-image \
                --repository-name "${repo}" \
                --image-ids imageTag="${SHA}" \
                --region us-east-1 \
                --query 'images[0].imageManifest' --output text)
              aws ecr put-image \
                --repository-name "${repo}" \
                --image-tag "${TAG}" \
                --image-manifest "${MANIFEST}" \
                --region us-east-1 > /dev/null
            else
              echo "==> ${repo}: no image for ${SHA} — building fresh (no preceding RC; safety net)"
              rebuild=true
            fi
          done
          echo "rebuild=${rebuild}" >> "$GITHUB_OUTPUT"

      - name: Build & push fresh images (base + api + worker + alloy)
        if: steps.promote.outputs.rebuild == 'true'
        uses: ./.github/actions/build-images
        with:
          registry: ${{ secrets.OPS_ECR_REGISTRY }}
          image-tag: ${{ github.ref_name }}
          sha: ${{ github.sha }}

      # Version-pinned deploy artifacts live in the PROD account's deploy bucket;
      # switch credentials from ops -> prod for the upload.
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Upload version-pinned artifacts to S3
        run: |
          TAG="${{ github.ref_name }}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          S3_BUCKET="rs-recruiting-deploy-prod-${ACCOUNT_ID}"
          aws s3 cp docker-compose.deploy.yml "s3://${S3_BUCKET}/deploy/${TAG}/docker-compose.deploy.yml"
          aws s3 cp scripts/deploy_ec2.sh     "s3://${S3_BUCKET}/deploy/${TAG}/deploy_ec2.sh"
          aws s3 cp nginx/nginx.conf          "s3://${S3_BUCKET}/deploy/${TAG}/nginx.conf"
          aws s3 cp alloy/config.alloy        "s3://${S3_BUCKET}/deploy/${TAG}/alloy/config.alloy"

  # ── Deploy backend to ECS (Fargate) ───────────────────────────────────────
  # Rolls the prod web + worker services to the released image via
  # aws-actions/amazon-ecs-deploy-task-definition: download the live (tofu-owned)
  # task definition, swap only the app + alloy image tags, register, update the
  # service, wait for stability. Terraform still owns the task-def *shape*
  # (ignore_changes = [task_definition]); CI owns only the image. Auth is GitHub
  # OIDC into rs-recruiting-prod-ecs-deploy (no stored AWS keys).
  deploy-ecs:
    name: Deploy to ECS (${{ matrix.container }})
    needs: [promote-prod]
    if: ${{ !contains(github.ref_name, '-rc.') && needs.promote-prod.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: rs-recruiting-prod-web
            container: web
            repo: api
          - service: rs-recruiting-prod-worker
            container: worker
            repo: worker
    steps:
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ vars.AWS_ECS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Download live task definition
        run: |
          aws ecs describe-task-definition --task-definition ${{ matrix.service }} \
            --query 'taskDefinition' --output json \
            | jq 'del(.taskDefinitionArn,.revision,.status,.requiresAttributes,.compatibilities,.registeredAt,.registeredBy)' \
            > task-definition.json

      - name: Render app image
        id: render-app
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb # v1.8.5
        with:
          task-definition: task-definition.json
          container-name: ${{ matrix.container }}
          image: ${{ secrets.OPS_ECR_REGISTRY }}/rs-recruiting/${{ matrix.repo }}:${{ github.ref_name }}

      - name: Render alloy sidecar image
        id: render-alloy
        uses: aws-actions/amazon-ecs-render-task-definition@6853cfae8c3a7d978fbf68b5a55453395541dfbb # v1.8.5
        with:
          task-definition: ${{ steps.render-app.outputs.task-definition }}
          container-name: alloy
          image: ${{ secrets.OPS_ECR_REGISTRY }}/rs-recruiting/alloy:${{ github.ref_name }}

      - name: Deploy
        uses: aws-actions/amazon-ecs-deploy-task-definition@a310a830f5c14e583e35d84e4e1ec7dd177c3c9c # v2.6.2
        with:
          task-definition: ${{ steps.render-alloy.outputs.task-definition }}
          service: ${{ matrix.service }}
          cluster: rs-recruiting-prod
          wait-for-service-stability: true

  # ── Build & deploy frontend to S3 + CloudFront ────────────────────────────

  deploy-frontend:
    name: Build & deploy frontend
    if: ${{ !contains(github.ref_name, '-rc.') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/deploy-frontend
        with:
          ref: ${{ github.ref_name }}
          release-version: ${{ github.ref_name }}
          sentry-dsn: ${{ secrets.VITE_SENTRY_DSN }}
          aws-role-arn: ${{ secrets.AWS_ROLE_ARN }}
          s3-bucket: ${{ secrets.S3_FRONTEND_BUCKET }}
          cloudfront-distribution-id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

  # ── Deploy backend to EC2 ─────────────────────────────────────────────────

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [promote-prod, deploy-frontend]
    if: |
      always() && !contains(github.ref_name, '-rc.') &&
      needs.promote-prod.result == 'success' &&
      needs.deploy-frontend.result == 'success'
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - uses: ./.github/actions/ssm-deploy
        with:
          ref: ${{ github.ref_name }}
          instance-id: ${{ secrets.EC2_INSTANCE_ID }}
          ecr-registry: ${{ secrets.OPS_ECR_REGISTRY }}

  # ── GitHub Release ──────────────────────────────────────────────────────

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ !contains(github.ref_name, '-rc.') && needs.deploy.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ github.ref_name }}" --generate-notes --repo "${{ github.repository }}"

  # ── Tear down ephemeral staging ───────────────────────────────────────────

  teardown-staging:
    name: Destroy ephemeral staging
    runs-on: ubuntu-latest
    needs: [deploy]
    if: ${{ !contains(github.ref_name, '-rc.') && needs.deploy.result == 'success' }}
    steps:
      - name: Mint GitHub App token (infra repo)
        id: app-token
        # TODO: pin to a commit SHA to match the repo's action-pinning convention.
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_APP_ID }}
          private-key: ${{ secrets.CI_APP_PRIVATE_KEY }}
          owner: lahavrud
          repositories: rs-recruiting-infra

      - name: Dispatch staging destroy
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh workflow run staging-destroy.yml \
            -R lahavrud/rs-recruiting-infra \
            -f reason=released

  # ── Failure notification ──────────────────────────────────────────────────

  notify-failure:
    name: Notify release failure
    runs-on: ubuntu-latest
    needs: [build-rc, promote-prod, deploy-frontend, deploy, github-release]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/notify-failure
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Release failed: ${{ github.ref_name }}"
          body: |
            **Release failed** for tag [`${{ github.ref_name }}`](https://github.com/${{ github.repository }}/commit/${{ github.sha }}).

            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for current production state and logs.

            To redeploy a previous version: [run the rollback workflow](https://github.com/${{ github.repository }}/actions/workflows/rollback.yml).
