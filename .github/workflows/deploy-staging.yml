name: Deploy Staging

# "Deploy Staging" — the only way an `-rc.N` tag gets created. Computes the
# next release-candidate version from commits since the last final tag and
# pushes it; the tag push is what triggers release.yml's build-rc job.
# See docs/release-process.md for the full release ritual.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to cut the RC from (leave blank for main)"
        required: false

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: tag-creation
  cancel-in-progress: false

jobs:
  cut-rc:
    name: Compute & push next RC tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve target commit
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute next RC tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          LAST_FINAL=$(git tag --list 'v*.*.*' | grep -vE -- '-rc\.' | sort -V | tail -1 || true)
          if [ -z "${LAST_FINAL}" ]; then
            RANGE="HEAD"
            BASE_VERSION="0.0.0"
          else
            RANGE="${LAST_FINAL}..HEAD"
            BASE_VERSION="${LAST_FINAL#v}"
          fi
          echo "==> Last final tag: ${LAST_FINAL:-<none>}"

          COMMITS=$(git log "${RANGE}" --format='%H')
          if [ -z "${COMMITS}" ]; then
            echo "==> No commits since ${LAST_FINAL:-the start of history} — nothing to release"
            exit 1
          fi

          # Highest-severity Conventional Commit type wins. A `release:major|minor|patch`
          # label on the merged PR overrides a mistyped/missing commit prefix.
          SEVERITY="patch"
          while read -r SHA; do
            [ -z "${SHA}" ] && continue

            TYPE=""
            PR_JSON=$(gh api "repos/${{ github.repository }}/commits/${SHA}/pulls" --jq '.[0] // empty' 2>/dev/null || true)
            if [ -n "${PR_JSON}" ]; then
              LABEL=$(echo "${PR_JSON}" | jq -r '.labels[].name' | grep -E '^release:(major|minor|patch)$' | head -1 || true)
              [ -n "${LABEL}" ] && TYPE="${LABEL#release:}"
            fi

            if [ -z "${TYPE}" ]; then
              SUBJECT=$(git log -1 --format='%s' "${SHA}")
              if echo "${SUBJECT}" | grep -qE '^[a-z]+(\([a-z0-9_-]+\))?!:'; then
                TYPE="major"
              elif echo "${SUBJECT}" | grep -qE '^feat(\([a-z0-9_-]+\))?:'; then
                TYPE="minor"
              else
                TYPE="patch"
              fi
            fi

            case "${TYPE}" in
              major) SEVERITY="major" ;;
              minor) [ "${SEVERITY}" != "major" ] && SEVERITY="minor" ;;
            esac
          done <<< "${COMMITS}"
          echo "==> Computed severity: ${SEVERITY}"

          MAJOR=$(echo "${BASE_VERSION}" | cut -d. -f1)
          MINOR=$(echo "${BASE_VERSION}" | cut -d. -f2)
          PATCH=$(echo "${BASE_VERSION}" | cut -d. -f3)
          case "${SEVERITY}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          TARGET="v${MAJOR}.${MINOR}.${PATCH}"
          echo "==> Target version: ${TARGET}"

          LAST_RC=$(git tag --list "${TARGET}-rc.*" | sort -V | tail -1 || true)
          if [ -z "${LAST_RC}" ]; then
            N=1
          else
            N=$(( $(echo "${LAST_RC}" | sed -E 's/.*-rc\.([0-9]+)$/\1/') + 1 ))
          fi
          RC_TAG="${TARGET}-rc.${N}"
          echo "==> Next RC tag: ${RC_TAG}"
          echo "tag=${RC_TAG}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}" "${{ steps.target.outputs.sha }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Summary
        run: |
          echo "### Cut \`${{ steps.version.outputs.tag }}\` from \`${{ steps.target.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Triggers release.yml's build-rc job to build & push the image." >> "$GITHUB_STEP_SUMMARY"
