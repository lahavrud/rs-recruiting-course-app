name: Deploy Staging

# "Deploy Staging" — the only way an `-rc.N` tag gets created. Computes the
# next release-candidate version from commits since the last final tag,
# pushes it, then explicitly dispatches release.yml's build-rc job against
# that tag — a GITHUB_TOKEN-authored push doesn't fire push-based workflow
# runs on its own, so the dispatch is required, not just the push.
# See docs/release-process.md for the full release ritual.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch, tag, or SHA to cut the RC from (leave blank for main)"
        required: false

permissions:
  contents: write
  pull-requests: read
  actions: write

concurrency:
  group: tag-creation
  cancel-in-progress: false

jobs:
  cut-rc:
    name: Compute & push next RC tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.ref || 'main' }}
          fetch-depth: 0
          fetch-tags: true

      - name: Resolve target commit
        id: target
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Compute next RC tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(bash scripts/compute_next_rc_tag.sh)
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}" "${{ steps.target.outputs.sha }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Trigger release build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref "${{ steps.version.outputs.tag }}"

      - name: Summary
        run: |
          echo "### Cut \`${{ steps.version.outputs.tag }}\` from \`${{ steps.target.outputs.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "Dispatched release.yml's build-rc job to build & push the image." >> "$GITHUB_STEP_SUMMARY"
