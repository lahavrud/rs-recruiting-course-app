name: Deliver

# Trunk-based continuous delivery. Every commit that lands on `main` and passes
# CI flows automatically:
#
#   merge to main → CI green → build image (by SHA)
#                 → ⏸ manual approval → deploy PRODUCTION → tag vX.Y.Z + Release
#
# We trigger off CI *completion* (not raw push) so a commit only ships after its
# own tests are green — no race between the deploy and the test run. The approval
# gate is GitHub Environments + required reviewers on the `production` environment
# (configured in repo settings, see docs/release-process.md); the deploy-prod job
# pauses there until a reviewer approves.
#
# Staging was retired for cost — the build is promoted straight to the prod gate.
# The staging stage is preserved (commented) below for later re-enable.
#
# Backing out a bad commit:
#   - before you approve prod → reject the pending deployment (nothing ships),
#     then `git revert` on main to roll a clean build forward.
#   - already in prod → run rollback.yml (re-point ECS to the previous task-def
#     revision, seconds, no rebuild), then `git revert` so git matches prod.

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

permissions:
  contents: read

jobs:
  # ── Build & push the released image (tagged by SHA) to ops ECR ─────────────
  build:
    name: Build & push image
    # Only the real merge commit on main: a successful CI run from a `push`
    # event on main. PRs (pull_request) and merge-queue intermediates
    # (merge_group, head_branch = gh-readonly-queue/...) are excluded.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      sha: ${{ github.event.workflow_run.head_sha }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_OPS_ECR_PUSH_ROLE_ARN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2

      - name: Skip build if image already in ECR
        id: exists
        run: |
          if aws ecr describe-images --repository-name rs-recruiting/api \
            --image-ids imageTag=${{ github.event.workflow_run.head_sha }} \
            --region us-east-1 > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "==> image already built — skipping"
          fi

      - name: Build & push (base + api + worker + alloy)
        if: steps.exists.outputs.exists != 'true'
        uses: ./.github/actions/build-images
        with:
          registry: ${{ secrets.OPS_ECR_REGISTRY }}
          image-tag: ${{ github.event.workflow_run.head_sha }}
          sha: ${{ github.event.workflow_run.head_sha }}

  # ── Deploy to staging (RETIRED — kept for later re-enable) ─────────────────
  # Staging was retired for cost (the env was on-demand scale-to-zero and didn't
  # justify the moving parts). The reusable `_deploy.yml` is environment-agnostic,
  # so re-enabling is: uncomment this job, add `deploy-staging` back to
  # deploy-prod's `needs`, and provision the staging infra + AWS_STAGING_ECS_DEPLOY_ROLE_ARN.
  # NOTE: a disabled workflow stage does NOT stop AWS charges — destroy the
  # staging tofu units in rs-recruiting-infra to actually save cost.
  #
  # deploy-staging:
  #   name: Staging
  #   needs: build
  #   uses: ./.github/workflows/_deploy.yml
  #   with:
  #     environment: staging
  #     cluster: rs-recruiting-staging
  #     web-service: rs-recruiting-staging-web
  #     worker-service: rs-recruiting-staging-worker
  #     image-tag: ${{ needs.build.outputs.sha }}
  #     run-migrations: true
  #     # Staging is backend-only (no edge/S3-frontend) and has no stable hostname
  #     # (web on the task's ephemeral public IP, scale-to-zero) — no frontend, no smoke.
  #     deploy-frontend: false
  #     smoke-url: ""
  #   secrets:
  #     ecs_role_arn: ${{ secrets.AWS_STAGING_ECS_DEPLOY_ROLE_ARN }}
  #     ops_ecr_registry: ${{ secrets.OPS_ECR_REGISTRY }}
  #     # No Sentry / frontend on staging.

  # ── Deploy to production (manual approval gate inside _deploy.yml) ──────────
  deploy-prod:
    name: Production
    needs: [build]
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: production
      cluster: rs-recruiting-prod
      web-service: rs-recruiting-prod-web
      worker-service: rs-recruiting-prod-worker
      image-tag: ${{ needs.build.outputs.sha }}
      run-migrations: true
      deploy-frontend: true
      smoke-url: https://rs-recruiting.com/health
    secrets:
      ecs_role_arn: ${{ vars.AWS_ECS_DEPLOY_ROLE_ARN }}
      frontend_role_arn: ${{ secrets.AWS_ROLE_ARN }}
      ops_ecr_registry: ${{ secrets.OPS_ECR_REGISTRY }}
      frontend_bucket: ${{ secrets.S3_FRONTEND_BUCKET }}
      frontend_distribution_id: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
      sentry_dsn: ${{ secrets.VITE_SENTRY_DSN }}

  # ── Tag the shipped commit + GitHub Release (after approval/deploy) ─────────
  tag-release:
    name: Tag & release
    needs: [build, deploy-prod]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build.outputs.sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Compute next release tag
        id: version
        run: echo "tag=$(bash scripts/compute_next_release_tag.sh)" >> "$GITHUB_OUTPUT"

      - name: Tag & create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          SHA: ${{ needs.build.outputs.sha }}
        run: |
          git tag "$TAG" "$SHA"
          git push origin "$TAG"
          gh release create "$TAG" --target "$SHA" --generate-notes \
            --repo "${{ github.repository }}"

  # ── Failure notification ───────────────────────────────────────────────────
  notify-failure:
    name: Notify delivery failure
    runs-on: ubuntu-latest
    needs: [build, deploy-prod, tag-release]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/notify-failure
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Delivery failed: ${{ github.event.workflow_run.head_sha }}"
          body: |
            **Delivery pipeline failed** for commit [`${{ github.event.workflow_run.head_sha }}`](https://github.com/${{ github.repository }}/commit/${{ github.event.workflow_run.head_sha }}).

            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for which stage failed and the current environment state.

            If production was affected, [run the rollback workflow](https://github.com/${{ github.repository }}/actions/workflows/rollback.yml).
