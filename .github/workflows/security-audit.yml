name: Security audit (weekly)

# pip-audit was previously a per-PR step with continue-on-error: true, so
# it cost ~30s on every CI run without ever gating anything. Running it
# weekly keeps the signal and saves ~1 billed minute per PR.

on:
  schedule:
    - cron: '0 5 * * 1'  # Mondays 05:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"

      - name: Audit Python dependencies for known CVEs
        # Export the locked runtime set (no dev/test deps) and pipe to pip-audit
        # so the audit reflects exactly what production runs.
        run: uv export --frozen --no-dev --no-emit-project --format requirements-txt | uv tool run pip-audit -r /dev/stdin
