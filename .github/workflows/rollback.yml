name: Rollback Production

# Redeploy a previous image that is already in ECR.
# By default deploys PREV_SHA (the version running before the most recent
# deploy). You can also specify any SHA that has been deployed before.
#
# WARNING — PREV_SHA footgun: after a successful rollback, deploy_ec2.sh sets
# PREV_SHA = the bad version it just replaced. Clicking "Rollback" a second
# time would redeploy the bad SHA. Always read the "Resolving rollback SHA"
# step output to confirm what is about to be deployed before acting.
on:
  workflow_dispatch:
    inputs:
      sha:
        description: "SHA to deploy (must exist in ECR — leave blank to use PREV_SHA)"
        required: false

# Share the deploy lock so this never races an in-flight deploy.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    name: Roll back production
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Resolve rollback SHA
        id: sha
        run: |
          INPUT_SHA="${{ github.event.inputs.sha }}"
          CURRENT=$(aws ssm get-parameter \
            --name /rs-recruiting/infra/CURRENT_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")
          PREV=$(aws ssm get-parameter \
            --name /rs-recruiting/infra/PREV_SHA \
            --query 'Parameter.Value' --output text 2>/dev/null || echo "")

          echo "==> CURRENT_SHA (running now): ${CURRENT:-<none>}"
          echo "==> PREV_SHA    (last deploy):  ${PREV:-<none>}"

          if [ -n "${INPUT_SHA}" ]; then
            echo "==> Using specified SHA: ${INPUT_SHA}"
            echo "sha=${INPUT_SHA}" >> "$GITHUB_OUTPUT"
          elif [ -n "${PREV}" ]; then
            echo "==> Using PREV_SHA: ${PREV}"
            echo "==> NOTE: if you previously ran a rollback, PREV_SHA may be a bad version."
            echo "==>       Check the SHA above. To deploy a specific version, re-run with an explicit SHA."
            echo "sha=${PREV}" >> "$GITHUB_OUTPUT"
          else
            echo "ERROR: PREV_SHA is not set and no SHA was provided. Cannot roll back."
            exit 1
          fi

      - uses: ./.github/actions/ssm-deploy
        with:
          ref: ${{ steps.sha.outputs.sha }}
          instance-id: ${{ secrets.EC2_INSTANCE_ID }}

  notify-failure:
    name: Notify rollback failure
    runs-on: ubuntu-latest
    needs: [rollback]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 1

      - uses: ./.github/actions/notify-failure
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Rollback failed — manual intervention required"
          body: |
            **Rollback workflow failed.** Production state is uncertain.

            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for logs, then inspect the EC2 instance directly.
