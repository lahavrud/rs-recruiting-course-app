name: Rollback

# Break-glass: re-point an ECS service at a previous task-definition revision —
# seconds, no rebuild. By default rolls BOTH web + worker in the chosen
# environment back to the most recent ACTIVE revision older than the one running
# now. You can also pin an explicit revision number.
#
# Scope: this restores previous *app code* only. It does NOT undo a database
# migration — schema changes must stay backward-compatible (expand/contract).
# After rolling back, `git revert` the bad commit on main so git matches the
# deployed state and the next delivery doesn't re-ship it.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to roll back"
        type: choice
        options: [production, staging]
        default: production
      service:
        description: "Which service(s) to roll back"
        type: choice
        options: [both, web, worker]
        default: both
      revision:
        description: "Explicit task-def revision number to roll to (blank = previous ACTIVE revision)"
        required: false

# Share the deploy lock so a rollback never races an in-flight deploy.
concurrency:
  group: deploy-${{ inputs.environment }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  rollback:
    name: Roll back ${{ inputs.environment }} (${{ inputs.service }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      CLUSTER: rs-recruiting-${{ inputs.environment == 'production' && 'prod' || 'staging' }}
    steps:
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ inputs.environment == 'production' && vars.AWS_ECS_DEPLOY_ROLE_ARN || secrets.AWS_STAGING_ECS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Roll back service(s)
        run: |
          set -euo pipefail
          PREFIX="${CLUSTER}"
          case "${{ inputs.service }}" in
            both)   SERVICES=("${PREFIX}-web" "${PREFIX}-worker") ;;
            web)    SERVICES=("${PREFIX}-web") ;;
            worker) SERVICES=("${PREFIX}-worker") ;;
          esac

          for svc in "${SERVICES[@]}"; do
            CURRENT=$(aws ecs describe-services --cluster "$CLUSTER" --services "$svc" \
              --query 'services[0].taskDefinition' --output text)
            CUR_REV="${CURRENT##*:}"
            echo "==> ${svc}: currently running revision ${CUR_REV}"

            if [ -n "${{ inputs.revision }}" ]; then
              TARGET_REV="${{ inputs.revision }}"
            else
              # Most recent ACTIVE revision strictly older than the running one.
              TARGET_REV=$(aws ecs list-task-definitions --family-prefix "$svc" \
                --status ACTIVE --sort DESC --query 'taskDefinitionArns[]' --output text \
                | tr '\t' '\n' | sed 's/.*://' \
                | awk -v cur="$CUR_REV" '$1 < cur {print; exit}')
            fi

            if [ -z "${TARGET_REV:-}" ]; then
              echo "::error::${svc}: no older ACTIVE revision found to roll back to"
              exit 1
            fi
            echo "==> ${svc}: rolling back to revision ${TARGET_REV}"
            aws ecs update-service --cluster "$CLUSTER" --service "$svc" \
              --task-definition "${svc}:${TARGET_REV}" >/dev/null
          done

          echo "==> waiting for service stability"
          aws ecs wait services-stable --cluster "$CLUSTER" --services "${SERVICES[@]}"
          echo "✅ rollback complete — remember to git revert the bad commit on main"

  notify-failure:
    name: Notify rollback failure
    runs-on: ubuntu-latest
    needs: [rollback]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - uses: ./.github/actions/notify-failure
        with:
          gh-token: ${{ secrets.GITHUB_TOKEN }}
          title: "Rollback failed — manual intervention required (${{ inputs.environment }})"
          body: |
            **Rollback workflow failed** for `${{ inputs.environment }}`. The environment state is uncertain.

            Check the [workflow run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for logs, then inspect the ECS service in the console.
