# Continuous delivery to stage. Fires when CI succeeds on a push to main
# (workflow_run, not the push) so a commit ships only after its own tests pass:
# build by SHA → bump the gitops tag (ArgoCD rolls stage) → deploy frontend →
# smoke the public domain. Prod is a separate human act — see release.yml.

name: CD (stage)

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

# Serialize stage deploys, never cancel mid-flight — a half-shipped deploy
# leaves images in ECR without their gitops bump.
concurrency:
  group: cd-stage
  cancel-in-progress: false

env:
  OPS_ECR_REGISTRY: 883627150418.dkr.ecr.eu-central-1.amazonaws.com
  ECR_PUSH_ROLE: arn:aws:iam::883627150418:role/rs-course-ci-ecr-push
  STAGE_FRONTEND_ROLE: arn:aws:iam::704601633261:role/rs-course-stage-ci-frontend-deploy

jobs:
  ship-stage:
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for ECR push + frontend deploy roles
      contents: read
    steps:
      - uses: actions/checkout@v7.0.1
        with:
          # The exact commit CI validated, not wherever main points now.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      # Per-image content tag: an unchanged service keeps its tag, so build-images
      # skips it and its gitops bump is a no-op — ArgoCD never rolls it.
      - uses: ./.github/actions/compute-tags
        id: tag

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ECR_PUSH_ROLE }}
          aws-region: eu-central-1

      - uses: aws-actions/amazon-ecr-login@v2.1.6

      - uses: ./.github/actions/build-images
        with:
          registry: ${{ env.OPS_ECR_REGISTRY }}
          base-tag: ${{ steps.tag.outputs.base }}
          api-tag: ${{ steps.tag.outputs.api }}
          worker-tag: ${{ steps.tag.outputs.worker }}

      - uses: ./.github/actions/bump-gitops
        with:
          environment: stage
          api-tag: ${{ steps.tag.outputs.api }}
          worker-tag: ${{ steps.tag.outputs.worker }}
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}

      # deploy-frontend re-auths into the non-prod account; the ECR session
      # above belongs to the ops account.
      - uses: ./.github/actions/deploy-frontend
        id: frontend
        with:
          env: stage
          aws-role-arn: ${{ env.STAGE_FRONTEND_ROLE }}

      # /health echoes the api tag (APP_VERSION), so waiting on it is waiting
      # for ArgoCD to converge this deploy.
      - uses: ./.github/actions/smoke-check
        with:
          domain: ${{ steps.frontend.outputs.domain }}
          expected-version: ${{ steps.tag.outputs.api }}

      - name: Summary
        run: |
          {
            echo "### Stage is live"
            echo 'api `${{ steps.tag.outputs.api }}` / worker `${{ steps.tag.outputs.worker }}` passed smoke on https://${{ steps.frontend.outputs.domain }}.'
            echo ""
            echo "Promote to prod per service: run the **Cut release** workflow (release.yml) for api / worker / frontend."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    needs: [ship-stage]
    if: failure()
    uses: ./.github/workflows/_notify-failure.yml
    secrets:
      webhook-url: ${{ secrets.SLACK_WEBHOOK_NONPROD }}
