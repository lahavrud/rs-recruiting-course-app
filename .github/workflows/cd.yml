# Trunk-based continuous delivery to stage. Triggered by CI *completing
# successfully* on a push to main (workflow_run, not the push itself), so a
# commit only ships after its own tests pass. Build once by SHA → commit the
# tag to the gitops repo (ArgoCD rolls the stage namespace) → deploy the
# frontend artifact → black-box smoke through the public domain.
#
# Prod is NOT deployed here — promotion is a human act: publishing a GitHub
# Release (see release.yml).

name: CD (stage)

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types: [completed]

# Serialize stage deploys; never cancel one mid-flight (a half-shipped
# deploy would leave images without their gitops bump).
concurrency:
  group: cd-stage
  cancel-in-progress: false

env:
  OPS_ECR_REGISTRY: 883627150418.dkr.ecr.eu-central-1.amazonaws.com
  ECR_PUSH_ROLE: arn:aws:iam::883627150418:role/rs-course-ci-ecr-push
  STAGE_FRONTEND_ROLE: arn:aws:iam::704601633261:role/rs-course-stage-ci-frontend-deploy

jobs:
  ship-stage:
    if: >-
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC for ECR push + frontend deploy roles
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # The exact commit CI validated — not whatever main points at now.
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1

      - name: Compute image tag
        id: tag
        run: echo "tag=$(git rev-parse --short=7 HEAD)" >> "$GITHUB_OUTPUT"

      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6
        with:
          role-to-assume: ${{ env.ECR_PUSH_ROLE }}
          aws-region: eu-central-1

      - uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      - uses: ./.github/actions/build-images
        with:
          registry: ${{ env.OPS_ECR_REGISTRY }}
          image-tag: ${{ steps.tag.outputs.tag }}

      - uses: ./.github/actions/bump-gitops
        with:
          environment: stage
          image-tag: ${{ steps.tag.outputs.tag }}
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}

      # Re-auth: deploy-frontend assumes the stage role in the non-prod
      # account (the ECR session belongs to the ops account).
      - uses: ./.github/actions/deploy-frontend
        id: frontend
        with:
          env: stage
          aws-role-arn: ${{ env.STAGE_FRONTEND_ROLE }}

      - uses: ./.github/actions/smoke-check
        with:
          domain: ${{ steps.frontend.outputs.domain }}
          expected-version: ${{ steps.tag.outputs.tag }}

      - name: Summary
        run: |
          {
            echo "### Stage is live"
            echo '`${{ steps.tag.outputs.tag }}` passed smoke on https://${{ steps.frontend.outputs.domain }}.'
            echo ""
            echo "Promote to prod by publishing a GitHub Release (tag \`vX.Y.Z\`) on this commit."
          } >> "$GITHUB_STEP_SUMMARY"

  notify-failure:
    needs: [ship-stage]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/notify-slack
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_NONPROD }}
