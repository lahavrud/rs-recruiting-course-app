server_tokens off;

# Sandbox: the Gateway/ALB terminates plain HTTP (no TLS — see
# rs-recruiting-infra tofu/modules/environment/ingress.tf) and only forwards
# paths the frontend's HTTPRoute claims (everything except /api, /auth,
# /health, /robots.txt, /sitemap.xml, which the backend's own HTTPRoute on
# the same Gateway handles directly). So unlike frontend/nginx.conf, this
# nginx never proxies to the API — it only serves the SPA bundle.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    # Hashed static assets — cache aggressively (filename changes on every build)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Block source maps from being served — they expose full TypeScript source.
    location ~* \.map$ {
        return 404;
    }

    # SPA fallback — never cache index.html so clients always get the latest
    # bundle references.
    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
