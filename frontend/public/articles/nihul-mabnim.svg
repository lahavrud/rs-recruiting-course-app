<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="מגדלי משרדים על רקע כהה">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0D0B09"/>
      <stop offset="55%" stop-color="#141210"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B87333" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
  </defs>

  <rect width="1600" height="600" fill="url(#sky)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>
  <rect x="0" y="350" width="1600" height="250" fill="url(#glow)"/>

  <!-- horizon line -->
  <line x1="0" y1="540" x2="1600" y2="540" stroke="#B87333" stroke-opacity="0.45" stroke-width="1"/>

  <!-- Back row towers (muted) -->
  <g fill="#1E1C1A" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1">
    <rect x="80"   y="280" width="120" height="260"/>
    <rect x="220"  y="220" width="110" height="320"/>
    <rect x="350"  y="300" width="140" height="240"/>
    <rect x="510"  y="200" width="90"  height="340"/>
    <rect x="620"  y="270" width="120" height="270"/>
    <rect x="760"  y="240" width="100" height="300"/>
    <rect x="880"  y="290" width="130" height="250"/>
    <rect x="1030" y="220" width="110" height="320"/>
    <rect x="1160" y="280" width="140" height="260"/>
    <rect x="1320" y="240" width="100" height="300"/>
    <rect x="1440" y="280" width="120" height="260"/>
  </g>

  <!-- Lit windows on back row -->
  <g fill="#B87333" fill-opacity="0.55">
    <rect x="100" y="320" width="14" height="14"/>
    <rect x="138" y="380" width="14" height="14"/>
    <rect x="170" y="440" width="14" height="14"/>
    <rect x="246" y="260" width="14" height="14"/>
    <rect x="280" y="340" width="14" height="14"/>
    <rect x="246" y="420" width="14" height="14"/>
    <rect x="386" y="340" width="14" height="14"/>
    <rect x="442" y="420" width="14" height="14"/>
    <rect x="534" y="260" width="14" height="14"/>
    <rect x="570" y="380" width="14" height="14"/>
    <rect x="654" y="310" width="14" height="14"/>
    <rect x="700" y="430" width="14" height="14"/>
    <rect x="794" y="290" width="14" height="14"/>
    <rect x="826" y="400" width="14" height="14"/>
    <rect x="910" y="330" width="14" height="14"/>
    <rect x="958" y="430" width="14" height="14"/>
    <rect x="1058" y="260" width="14" height="14"/>
    <rect x="1100" y="370" width="14" height="14"/>
    <rect x="1192" y="320" width="14" height="14"/>
    <rect x="1248" y="420" width="14" height="14"/>
    <rect x="1352" y="290" width="14" height="14"/>
    <rect x="1390" y="400" width="14" height="14"/>
    <rect x="1470" y="320" width="14" height="14"/>
    <rect x="1510" y="420" width="14" height="14"/>
  </g>

  <!-- Foreground hero tower with brighter windows -->
  <g>
    <rect x="700" y="120" width="180" height="420" fill="#1A1816" stroke="#B87333" stroke-opacity="0.5" stroke-width="1.5"/>
    <g fill="#C9A84C" fill-opacity="0.85" filter="url(#soft)">
      <rect x="722" y="160" width="18" height="18"/>
      <rect x="760" y="160" width="18" height="18"/>
      <rect x="836" y="160" width="18" height="18"/>
      <rect x="722" y="210" width="18" height="18"/>
      <rect x="798" y="210" width="18" height="18"/>
      <rect x="836" y="210" width="18" height="18"/>
      <rect x="760" y="260" width="18" height="18"/>
      <rect x="798" y="260" width="18" height="18"/>
      <rect x="722" y="310" width="18" height="18"/>
      <rect x="836" y="310" width="18" height="18"/>
      <rect x="760" y="360" width="18" height="18"/>
      <rect x="798" y="360" width="18" height="18"/>
      <rect x="722" y="410" width="18" height="18"/>
      <rect x="798" y="410" width="18" height="18"/>
      <rect x="836" y="410" width="18" height="18"/>
      <rect x="760" y="460" width="18" height="18"/>
      <rect x="836" y="460" width="18" height="18"/>
      <rect x="722" y="510" width="18" height="18"/>
      <rect x="798" y="510" width="18" height="18"/>
    </g>
    <!-- Antenna -->
    <line x1="790" y1="120" x2="790" y2="80" stroke="#C9A84C" stroke-opacity="0.7" stroke-width="2"/>
    <circle cx="790" cy="75" r="3" fill="#C9A84C"/>
  </g>
</svg>
