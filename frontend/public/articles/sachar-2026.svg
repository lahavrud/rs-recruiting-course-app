<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="גרף מגמת שכר עולה לשנת 2026">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0D0B09"/>
      <stop offset="100%" stop-color="#1A1816"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%"  stop-color="#8C5727"/>
      <stop offset="100%" stop-color="#C9A84C"/>
    </linearGradient>
    <linearGradient id="area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#B87333" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="80" height="60" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#grid)"/>

  <!-- Axes -->
  <line x1="120" y1="80"  x2="120"  y2="500" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="120" y1="500" x2="1500" y2="500" stroke="#ffffff" stroke-opacity="0.18" stroke-width="1"/>

  <!-- Y-axis tick labels (₪ amounts) -->
  <g font-family="Inter, sans-serif" font-size="14" fill="#ffffff" fill-opacity="0.35" text-anchor="end">
    <text x="105" y="130">50K</text>
    <text x="105" y="220">40K</text>
    <text x="105" y="310">30K</text>
    <text x="105" y="400">20K</text>
    <text x="105" y="490">10K</text>
  </g>

  <!-- Faint horizontal guides -->
  <g stroke="#ffffff" stroke-opacity="0.06" stroke-width="1">
    <line x1="120" y1="130" x2="1500" y2="130"/>
    <line x1="120" y1="220" x2="1500" y2="220"/>
    <line x1="120" y1="310" x2="1500" y2="310"/>
    <line x1="120" y1="400" x2="1500" y2="400"/>
  </g>

  <!-- Bars (rising) -->
  <g>
    <rect x="200"  y="400" width="100" height="100" fill="url(#bar)" opacity="0.55"/>
    <rect x="370"  y="350" width="100" height="150" fill="url(#bar)" opacity="0.65"/>
    <rect x="540"  y="280" width="100" height="220" fill="url(#bar)" opacity="0.75"/>
    <rect x="710"  y="240" width="100" height="260" fill="url(#bar)" opacity="0.85"/>
    <rect x="880"  y="190" width="100" height="310" fill="url(#bar)" opacity="0.95"/>
    <rect x="1050" y="150" width="100" height="350" fill="url(#bar)"/>
    <rect x="1220" y="110" width="100" height="390" fill="url(#bar)"/>
  </g>

  <!-- Trend line + area fill -->
  <path d="M 250 400 L 420 350 L 590 280 L 760 240 L 930 190 L 1100 150 L 1270 110 L 1270 500 L 250 500 Z"
        fill="url(#area)"/>
  <polyline points="250,400 420,350 590,280 760,240 930,190 1100,150 1270,110"
            fill="none" stroke="#C9A84C" stroke-opacity="0.85" stroke-width="2.5"/>

  <!-- Trend dots -->
  <g fill="#C9A84C">
    <circle cx="250" cy="400" r="5"/>
    <circle cx="420" cy="350" r="5"/>
    <circle cx="590" cy="280" r="5"/>
    <circle cx="760" cy="240" r="5"/>
    <circle cx="930" cy="190" r="5"/>
    <circle cx="1100" cy="150" r="5"/>
    <circle cx="1270" cy="110" r="7"/>
    <circle cx="1270" cy="110" r="14" fill="none" stroke="#C9A84C" stroke-opacity="0.35" stroke-width="1.5"/>
  </g>

  <!-- Currency mark -->
  <text x="1370" y="135" font-family="Inter, sans-serif" font-size="32" font-weight="600" fill="#C9A84C">₪</text>
</svg>
