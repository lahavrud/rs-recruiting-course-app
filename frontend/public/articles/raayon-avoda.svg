<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="פגישת ראיון עבודה — שתי דמויות סביב שולחן">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0D0B09"/>
      <stop offset="100%" stop-color="#181614"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="80%" r="50%">
      <stop offset="0%"  stop-color="#B87333" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#B87333" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#B87333"/>
      <stop offset="50%" stop-color="#C9A84C"/>
      <stop offset="100%" stop-color="#B87333"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="600" fill="url(#bg)"/>
  <rect width="1600" height="600" fill="url(#spot)"/>

  <!-- Subtle copper hairlines -->
  <line x1="0"    y1="480" x2="1600" y2="480" stroke="#B87333" stroke-opacity="0.18" stroke-width="1"/>
  <line x1="0"    y1="120" x2="1600" y2="120" stroke="#B87333" stroke-opacity="0.10" stroke-width="1"/>

  <!-- Table -->
  <rect x="380" y="430" width="840" height="14" rx="2" fill="#1E1C1A" stroke="#B87333" stroke-opacity="0.35" stroke-width="1"/>
  <rect x="380" y="444" width="840" height="40" fill="#141210"/>

  <!-- Documents on table -->
  <g fill="#1A1816" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1">
    <rect x="640" y="402" width="120" height="34"/>
    <rect x="840" y="402" width="120" height="34"/>
  </g>
  <g fill="#B87333" fill-opacity="0.55">
    <rect x="652" y="410" width="60" height="2"/>
    <rect x="652" y="418" width="80" height="2"/>
    <rect x="652" y="426" width="40" height="2"/>
    <rect x="852" y="410" width="60" height="2"/>
    <rect x="852" y="418" width="80" height="2"/>
    <rect x="852" y="426" width="40" height="2"/>
  </g>

  <!-- Left figure: interviewer (lighter, more upright) -->
  <g>
    <!-- head -->
    <circle cx="500" cy="220" r="44" fill="#2A2724" stroke="#B87333" stroke-opacity="0.55" stroke-width="1.5"/>
    <!-- shoulders / torso -->
    <path d="M 410 430 C 410 340 460 290 500 290 C 540 290 590 340 590 430 Z" fill="#1E1C1A" stroke="#B87333" stroke-opacity="0.55" stroke-width="1.5"/>
    <!-- collar accent -->
    <path d="M 488 300 L 500 340 L 512 300" fill="none" stroke="#C9A84C" stroke-opacity="0.7" stroke-width="1.5"/>
  </g>

  <!-- Right figure: candidate (slightly forward, attentive) -->
  <g>
    <circle cx="1100" cy="230" r="44" fill="#2A2724" stroke="#C9A84C" stroke-opacity="0.55" stroke-width="1.5"/>
    <path d="M 1010 430 C 1010 350 1060 300 1100 300 C 1140 300 1190 350 1190 430 Z" fill="#1E1C1A" stroke="#C9A84C" stroke-opacity="0.55" stroke-width="1.5"/>
    <path d="M 1088 310 L 1100 350 L 1112 310" fill="none" stroke="#B87333" stroke-opacity="0.7" stroke-width="1.5"/>
  </g>

  <!-- Dialog connector — a copper arc representing the conversation -->
  <path d="M 560 200 Q 800 110 1040 200" fill="none" stroke="url(#copper)" stroke-opacity="0.55" stroke-width="1.5" stroke-dasharray="2 8"/>
  <circle cx="800" cy="148" r="6" fill="#C9A84C" fill-opacity="0.85"/>
  <circle cx="800" cy="148" r="14" fill="none" stroke="#C9A84C" stroke-opacity="0.35" stroke-width="1"/>
</svg>
