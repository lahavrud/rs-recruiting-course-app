replicaCount: 1

image:
  repository: ""
  tag: "latest"
  pullPolicy: IfNotPresent

nameOverride: ""
fullnameOverride: ""

service:
  port: 8000

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  # Requires the metrics-server EKS addon — not yet installed on the sandbox
  # cluster, so this HPA will exist but report <unknown> for current CPU
  # until that's added.
  targetCPUUtilizationPercentage: 70

# HTTPRoute on the cluster's shared Gateway (see rs-recruiting-infra
# tofu/modules/environment/ingress.tf) — the sandbox uses AWS Load Balancer
# Controller's Gateway API support, not a classic Ingress resource, so this
# chart follows the same convention ArgoCD/Grafana use rather than templating
# a networking.k8s.io/v1 Ingress.
httpRoute:
  enabled: true
  gatewayName: sandbox
  gatewayNamespace: kube-system
  # Routes exposed to the backend; everything else on the Gateway falls
  # through to the frontend. Rarely needs changing — pathPrefix is what
  # varies per sub-environment.
  routes:
    - api
    - auth
    - health
    - robots.txt
    - sitemap.xml
  # Prepended to every route above (e.g. "/dev" -> "/dev/api"), since
  # sandbox-staging/sandbox-prod/sandbox-dev all share one ALB and need
  # distinct paths to avoid colliding. Non-empty values also add a
  # Gateway API URLRewrite filter (ReplacePrefixMatch) that strips the
  # prefix before forwarding — FastAPI's routes are registered at the bare
  # path (e.g. /api), so without the rewrite the backend 404s on the
  # prefixed request. Leave empty for sandbox-prod (matches rs-recruiting-
  # infra's cdn.tf, which forwards unprefixed); set to "/staging" for
  # sandbox-staging, "/dev" for sandbox-dev.
  pathPrefix: ""

# Plain (non-secret) runtime config. ENVIRONMENT is deliberately left as
# "development" (not "sandbox" — Settings.environment only accepts
# development/staging/production) so the app reads config from env vars
# instead of trying to load it from SSM, which sandbox pods have no IAM
# access to.
env:
  environment: development
  jwtAlgorithm: HS256
  jwtAccessTokenExpireMinutes: 10
  # Set to the Gateway's actual hostname (see chart README) once known —
  # can't be defaulted here since the ALB hostname is assigned at apply time.
  allowedOrigins: "http://localhost:3000"
  frontendBaseUrl: "http://localhost:3000"

# Name of a pre-existing Secret (DATABASE_URL + JWT_SECRET_KEY keys) to mount
# instead of rendering one from `secrets` below. Set by the ArgoCD
# Application's values overlay (#20) for sandbox-dev/staging/prod — Tofu
# creates "backend-secrets" in each namespace from real RDS/JWT values it
# already knows (rs-recruiting-infra's environment module), so no secret
# material ever needs to go in this repo or the gitops repo. Leave empty for
# a manual `helm install`, which falls back to `secrets` below instead.
existingSecret: ""

# Secret runtime config — rendered into a Kubernetes Secret (templates/secret.yaml)
# only when existingSecret above is empty. Do NOT put real values here.
# Override at install time, e.g.:
#   helm install backend . -f secrets.values.yaml   (secrets.values.yaml gitignored)
#   helm install backend . --set-string secrets.jwtSecretKey=...
secrets:
  databaseUrl: ""
  jwtSecretKey: ""
