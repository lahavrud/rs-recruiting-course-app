apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "backend.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backend.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: {{ include "backend.fullname" . }}
          env:
            - name: ENVIRONMENT
              value: {{ .Values.env.environment | quote }}
            - name: JWT_ALGORITHM
              value: {{ .Values.env.jwtAlgorithm | quote }}
            - name: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
              value: {{ .Values.env.jwtAccessTokenExpireMinutes | quote }}
            - name: ALLOWED_ORIGINS
              value: {{ .Values.env.allowedOrigins | quote }}
            - name: FRONTEND_BASE_URL
              value: {{ .Values.env.frontendBaseUrl | quote }}
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
