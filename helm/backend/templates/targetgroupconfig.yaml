{{- if .Values.httpRoute.enabled }}
# Without this, the AWS Load Balancer Controller defaults new target groups
# to instance mode, which doesn't work against a ClusterIP Service — mirrors
# the same fix applied to ArgoCD/Grafana in rs-recruiting-infra's ingress.tf.
apiVersion: gateway.k8s.aws/v1beta1
kind: TargetGroupConfiguration
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  targetReference:
    name: {{ include "backend.fullname" . }}
  defaultConfiguration:
    targetType: ip
    # Health checks hit the Service/pod directly, bypassing the HTTPRoute's
    # URLRewrite — so this must be the bare path the app actually serves,
    # not the externally-prefixed one. Same gap that bit ArgoCD's ALB health
    # check (rs-recruiting-infra#50): the default "/" 404s here too.
    healthCheckConfig:
      healthCheckPath: /health
{{- end }}
