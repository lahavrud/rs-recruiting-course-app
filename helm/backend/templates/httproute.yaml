{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "backend.fullname" . }}
  labels:
    {{- include "backend.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.httpRoute.gatewayName }}
      namespace: {{ .Values.httpRoute.gatewayNamespace }}
      sectionName: http
  rules:
    {{- range $route := .Values.httpRoute.routes }}
    - matches:
        - path:
            type: PathPrefix
            value: {{ printf "%s/%s" $.Values.httpRoute.pathPrefix $route }}
      {{- if $.Values.httpRoute.pathPrefix }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /{{ $route }}
      {{- end }}
      backendRefs:
        - name: {{ include "backend.fullname" $ }}
          port: {{ $.Values.service.port }}
    {{- end }}
{{- end }}
